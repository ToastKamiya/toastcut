<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToastCut V2.0.1</title>
  <link rel="stylesheet" href="./assets/tabler-icons.min.css">
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>

<div class="app">
  <div class="left">
    <div class="preview-area" id="dropZone">
      <video id="videoPreview" controls class="video-loaded">
        Your browser does not support the video tag.
      </video>
      <div class="video-mock" id="videoMock">
        <div class="play-icon"><i class="ti ti-player-play" style="font-size:18px;margin-left:2px"></i></div>
        <div class="drop-hint">Drop a video file here<br><span>or click area to open file explorer</span></div>
      </div>
      <input type="file" id="inputFile" accept="video/*" style="display: none;">
      <div class="section-indicator" id="timestampIndicator">00:00:00</div>
    </div>

    <div class="file-bar" id="fileBarTrigger">
      <div class="file-dot"></div>
      <span class="file-name" id="file-name-card">No file selected</span>
      <span class="file-chip">Open File</span>
    </div>
  </div>

  <div class="right">
    <div class="brand-bar">
      <div class="brand-icon">
        <svg viewBox="0 0 12 12"><path d="M2 9L6 3L10 9H2Z"/></svg>
      </div>
      <span class="brand-name">ToastCut</span>
      <button id="themeToggle" class="theme-toggle-btn" title="Toggle Theme">
        <i class="ti ti-moon" id="themeIcon"></i>
      </button>
      <span class="brand-ver">v2.0.1</span>
    </div>

    <select id="operation" style="display: none;">
        <option value="" disabled selected>Select your option</option>
        <option value="TRIM">Trim</option>
        <option value="CONCATENATE">Concatenate</option>
        <option value="CROP">Crop</option>
        <option value="VFRtoCFR">VFR to CFR</option>
        <option value="MERGEAUDIO">Merge Audio</option>
        <option value="BITRATE">Compress</option>
        <option value="GIF">Make GIF</option>
    </select>

    <div class="ops-section">
      <div class="ops-label">Operation</div>
      <div class="ops-grid" id="customOpsGrid">
        <button class="op-btn active" data-value="TRIM"><i class="ti ti-cut"></i>Trim</button>
        <button class="op-btn" data-value="CONCATENATE"><i class="ti ti-arrows-join"></i>Concatenate</button>
        <button class="op-btn" data-value="CROP"><i class="ti ti-crop"></i>Crop</button>
        <button class="op-btn" data-value="VFRtoCFR"><i class="ti ti-activity"></i>VFR → CFR</button>
        <button class="op-btn" data-value="MERGEAUDIO"><i class="ti ti-music"></i>Merge audio</button>
        <button class="op-btn" data-value="BITRATE"><i class="ti ti-file-zip"></i>Compress</button>
        <button class="op-btn" data-value="GIF"><i class="ti ti-gif"></i>Make GIF</button>
      </div>
    </div>

    <div class="params" id="operationDetails"></div>

    <div class="run-section">
      <div id="output">System ready...</div>

      <label class="save-row">
        <input type="checkbox" id="askSaveLocation" class="save-check" />
        <span class="save-label">Choose output location manually</span>
      </label>

      <button class="run-btn" id="runButton">
        <i class="ti ti-player-play"></i> Run FFmpeg
      </button>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
      const selectElement = document.getElementById('operation');
      const opsGrid = document.getElementById('customOpsGrid');
      const inputFile = document.getElementById('inputFile');
      const dropZone = document.getElementById('dropZone');
      const fileBarTrigger = document.getElementById('fileBarTrigger');
      const fileNameCard = document.getElementById('file-name-card');
      const videoPreview = document.getElementById('videoPreview');
      const videoMock = document.getElementById('videoMock');

      // --- Theme Toggle Controller ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        // 1. Check for saved theme preference on startup
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-mode');
            themeIcon.className = 'ti ti-sun';
        } else {
            document.documentElement.classList.remove('light-mode');
            themeIcon.className = 'ti ti-moon';
        }

        // 2. Toggle and save preference on click
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('light-mode');

            if (document.documentElement.classList.contains('light-mode')) {
                themeIcon.className = 'ti ti-sun';
                localStorage.setItem('theme', 'light');
            } else {
                themeIcon.className = 'ti ti-moon';
                localStorage.setItem('theme', 'dark');
            }
        });

      // --- Bind Grid Buttons to Engine Logic ---
      opsGrid.querySelectorAll('.op-btn').forEach(button => {
          button.addEventListener('click', () => {
              opsGrid.querySelectorAll('.op-btn').forEach(btn => btn.classList.remove('active'));
              button.classList.add('active');

              // Mirror selections to standard hidden element
              selectElement.value = button.dataset.value;
              selectElement.dispatchEvent(new Event('change', { bubbles: true }));
          });
      });

      // --- File selection controllers ---
      const openExplorer = (e) => {
          if (e.target !== videoPreview) inputFile.click();
      };
      dropZone.addEventListener('click', openExplorer);
      fileBarTrigger.addEventListener('click', openExplorer);

      // Drag and Drop implementation
      dropZone.addEventListener('dragover', (e) => e.preventDefault());
      dropZone.addEventListener('drop', (e) => {
          e.preventDefault();
          if (e.dataTransfer.files.length > 0) {
              inputFile.files = e.dataTransfer.files;
              inputFile.dispatchEvent(new Event('change', { bubbles: true }));
          }
      });

      // Synchronize media visibility states
      inputFile.addEventListener('change', () => {
          if (inputFile.files.length > 0) {
              fileNameCard.textContent = inputFile.files[0].name;
              videoMock.style.display = 'none';
              videoPreview.style.display = 'block';
          } else {
              fileNameCard.textContent = 'No file selected';
              videoMock.style.display = 'flex';
              videoPreview.style.display = 'none';
          }
      });

      // --- Native Video Timeline Sync ---
      videoPreview.addEventListener('timeupdate', () => {
          if (!videoPreview.duration) return;
          const current = videoPreview.currentTime;
          const duration = videoPreview.duration;
          const pct = (current / duration) * 100;

          const formatTime = (seconds) => {
              const mins = Math.floor(seconds / 60);
              const secs = Math.floor(seconds % 60);
              return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
          };

          // Continuous live overlay tracking
          const hrs = Math.floor(current / 3600).toString().padStart(2, '0');
          const m = Math.floor((current % 3600) / 60).toString().padStart(2, '0');
          const s = Math.floor(current % 60).toString().padStart(2, '0');
          document.getElementById('timestampIndicator').textContent = `${hrs}:${m}:${s}`;
      });

      videoPreview.addEventListener('loadedmetadata', () => {
          const duration = videoPreview.duration;
          const mins = Math.floor(duration / 60);
          const secs = Math.floor(duration % 60);
      });

      // Trigger default active selection (TRIM) on startup sequence
      setTimeout(() => {
          selectElement.value = 'TRIM';
          selectElement.dispatchEvent(new Event('change', { bubbles: true }));
      }, 50);
  });
</script>
<script src="./renderer.js"></script>
</body>
</html>
